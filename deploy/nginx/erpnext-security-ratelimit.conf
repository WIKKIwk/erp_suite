# Include this snippet inside your ERPNext nginx server block.
# Tune values based on actual traffic.

# Per-IP zones
limit_req_zone $binary_remote_addr zone=ess_login_zone:20m rate=20r/m;
limit_req_zone $binary_remote_addr zone=ess_api_zone:30m rate=240r/m;
limit_conn_zone $binary_remote_addr zone=ess_conn_zone:20m;

# Login endpoint hard limit
location = /api/method/login {
	limit_req zone=ess_login_zone burst=3 nodelay;
	limit_conn ess_conn_zone 20;
	proxy_read_timeout 60s;
	proxy_send_timeout 60s;
	client_max_body_size 1m;
	include proxy_params;
	proxy_pass http://frappe-bench-frappe-web;
}

# API global shaping
location /api/ {
	limit_req zone=ess_api_zone burst=80 nodelay;
	limit_conn ess_conn_zone 40;
	proxy_read_timeout 90s;
	proxy_send_timeout 90s;
	client_max_body_size 10m;
	include proxy_params;
	proxy_pass http://frappe-bench-frappe-web;
}
